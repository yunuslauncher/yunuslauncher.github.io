<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunus Launcher - İndirme Merkezi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 550px;
            background-color: #111827;
            border: 2px solid #1f2937;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 {
            color: #38bdf8;
            font-size: 32px;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 35px;
            text-transform: uppercase;
        }
        .info-box {
            background-color: #1f2937;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #38bdf8;
            text-align: left;
        }
        .info-box p {
            margin: 5px 0;
            font-size: 15px;
        }
        .btn-download {
            display: inline-block;
            width: 100%;
            max-width: 300px;
            background-color: #38bdf8;
            color: #0b0f19;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
        }
        .btn-download:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
        }
        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>YUNUS LAUNCHER</h1>
    <div class="subtitle">Resmi İndirme Merkezi</div>

    <div class="info-box">
        <p><strong>Sürüm:</strong> v1.0.0</p>
        <p><strong>Sistem:</strong> Windows 10 / 11</p>
        <p><strong>Açıklama:</strong> Pürüzsüz ve hızlı Minecraft deneyimi için özel olarak geliştirilmiş yerli launcher.</p>
    </div>

    <!-- Launcher dosyanı internete (Drive, Mediafire vb.) yükleyince linkini aşağıdaki href="#" kısmına koyacağız -->
    <a href="#" class="btn-download">📥 Launcher'ı İndir (Sürüm 1)</a>

    <footer>
        &copy; 2026 Yunus Launcher Projesi. Tüm Hakları Saklıdır.
    </footer>
</div>

</body>
</html>
