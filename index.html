<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunus Launcher - İndirme Merkezi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Arka plana modern, shader'lı ve gerçekçi gökyüzü/su efektli bir Minecraft manzarası koyduk */
            background: linear-gradient(rgba(11, 20, 38, 0.6), rgba(11, 20, 38, 0.6)), 
                        url('https://images.alphacoders.com/132/1329124.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 580px;
            /* Arka planı modern ve şeffaf koyu mavi-gri yaptık */
            background-color: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            backdrop-filter: blur(8px); /* Arkadaki shader'lı resmi pürüzsüzce bulandırır */
        }
        h1 {
            color: #38bdf8; /* Baby blue tonlarında parlak mavi */
            font-size: 36px;
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }
        .info-box {
            background-color: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #38bdf8;
            text-align: left;
        }
        .info-box p {
            margin: 10px 0;
            font-size: 15px;
            color: #cbd5e1;
        }
        .info-box strong {
            color: #fff;
        }
        .btn-download {
            display: inline-block;
            width: 100%;
            max-width: 320px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 16px 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 25px;
        }
        .btn-download:hover {
            background-color: #7dd3fc;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(56, 189, 248, 0.6);
        }
        
        /* Modern Alt Butonlar */
        .sub-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }
        .btn-secondary {
            flex: 1;
            max-width: 160px;
            background-color: rgba(30, 41, 59, 0.8);
            color: #f1f5f9;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover {
            background-color: rgba(51, 65, 85, 0.9);
            color: #38bdf8;
            border-color: #38bdf8;
        }
        footer {
            margin-top: 40px;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>YUNUS LAUNCHER</h1>
    <div class="subtitle">Modern Web Connection Hub</div>

    <div class="info-box">
        <p><strong>Sürüm:</strong> v1.0.0</p>
        <p><strong>Sistem:</strong> Windows 10 / 11</p>
        <p><strong>Açıklama:</strong> Pürüzsüz ve hızlı Minecraft deneyimi için özel olarak geliştirilmiş yerli launcher.</p>
    </div>

    <!-- İndirme Butonu -->
    <a href="#" class="btn-download">📥 Launcher'ı İndir (Sürüm 1)</a>

    <!-- Kaynak Kodu ve Yardım Kısmı -->
    <div class="sub-buttons">
        <a href="https://github.com/yunuslauncher/yunuslauncher.github.io" target="_blank" class="btn-secondary">💻 Kaynak Kodu</a>
        <a href="#" class="btn-secondary">❓ Yardım & Destek</a>
    </div>

    <footer>
        &copy; 2026 Yunus Launcher Projesi. Tüm Hakları Saklıdır.
    </footer>
</div>

</body>
</html>
