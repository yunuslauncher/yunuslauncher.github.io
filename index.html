<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunus Launcher - Legacy Web Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 650px;
            background-color: #111111;
            border: 2px solid #2d2d2d;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
        }
        h1 {
            color: #2ecc71;
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .status-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .server-address {
            font-family: 'Consolas', monospace;
            font-size: 20px;
            color: #3498db;
            background-color: #262626;
            padding: 10px 15px;
            border-radius: 4px;
            display: inline-block;
            margin: 15px 0;
            border: 1px dashed #444;
        }
        .status-online {
            color: #2ecc71;
            font-weight: bold;
        }
        .btn {
            display: block;
            width: 100%;
            max-width: 280px;
            margin: 12px auto;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s ease;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #2ecc71;
        }
        .btn-secondary {
            background-color: #34495e;
        }
        .btn-secondary:hover {
            background-color: #415b76;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>YUNUS LAUNCHER</h1>
    <div class="subtitle">Official Legacy Web Connection</div>

    <div class="status-card">
        <p>Sunucu Durumu: <span class="status-online">● ÇEVRİMİÇİ</span></p>
        <p>Uzun portlarla uğraşmadan direkt aşağıdaki adresten bağlan kanka:</p>
        <div class="server-address">yunuslauncher.playit.gg</div>
    </div>

    <a href="#" class="btn">🚀 Sunucuya Katıl</a>
    <a href="https://playit.gg" target="_blank" class="btn btn-secondary">🌐 Playit Panelini Aç</a>

    <footer>
        &copy; 2026 Yunus Launcher - Tüm Hakları Saklıdır.
    </footer>
</div>

</body>
</html>
